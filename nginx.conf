server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # the notes api runs in its own container. hand /api off to it so the
    # browser still sees a single origin. forward the real visitor ip so the
    # api can rate limit and cap one note per person.
    location /api/ {
        proxy_pass http://api:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # the app uses a client side router, so unknown paths fall back to
    # index.html instead of 404ing on refresh or a direct link.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
